<!DOCTYPE html>
<html lang="en">
<head>
    <title>Patient Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/smoothie@1.36.1/smoothie.min.js"></script>
</head>
<body>

    <header>
        <div class="header-left">
            <div class="status-dot"></div>
            <span class="header-label">LIVE</span>
        </div>
        <h1>PATIENT <span>MONITOR</span></h1>
        <div class="header-right">
            <span class="header-label" id="clock">--:--:--</span>
        </div>
    </header>

    <div class="vitals-grid">

        <div class="card card--critical">
            <div class="card-label">HRV</div>
            <p class="card-value" id="hrv">--</p>
            <div class="card-unit">bpm</div>
        </div>


        <div class="card card--spo2">
            <div class="card-label">SpO₂</div>
            <p class="card-value" id="spo2_val">--</p>
            <div class="card-unit">%</div>
        </div>

        <div class="card">
            <div class="card-label">PULSE RATE</div>
            <p class="card-value" id="pr">--</p>
            <div class="card-unit">bpm</div>
        </div>

        <div class="card">
            <div class="card-label">RESP RATE</div>
            <p class="card-value" id="resp_rate">--</p>
            <div class="card-unit">br/min</div>
        </div>

        <div class="card card--bp">
            <div class="card-label">SYS</div>
            <p class="card-value" id="sys">--</p>
            <div class="card-unit">mmHg</div>
        </div>

        <div class="card card--bp">
            <div class="card-label">DIA</div>
            <p class="card-value" id="dia">--</p>
            <div class="card-unit">mmHg</div>
        </div>

        <div class="card card--bp">
            <div class="card-label">MAP</div>
            <p class="card-value" id="map">--</p>
            <div class="card-unit">mmHg</div>
        </div>

        <div class="card card--temp">
            <div class="card-label">TEMP 1</div>
            <p class="card-value" id="temp1">--</p>
            <div class="card-unit">°C</div>
        </div>

        <div class="card card--temp">
            <div class="card-label">TEMP 2</div>
            <p class="card-value" id="temp2">--</p>
            <div class="card-unit">°C</div>
        </div>

    </div>

    <div class="chart-section">
        <div class="chart-header">
            <span class="chart-title">ECG Wave I</span>
            
        </div>
        <div class="chart-container">
            <canvas id="ecgCanvasI" width="800" height="200"></canvas>
        </div>
    </div>

    <div class="chart-section">
        <div class="chart-header">
            <span class="chart-title">ECG Wave II</span>
            
        </div>
        <div class="chart-container">
            <canvas id="ecgCanvasII" width="800" height="200"></canvas>
        </div>
    </div>

    <div class="chart-section">
        <div class="chart-header">
            <span class="chart-title">ECG Wave V</span>
            
        </div>
        <div class="chart-container">
            <canvas id="ecgCanvasV" width="800" height="200"></canvas>
        </div>
    </div>

    <div class="chart-section">
        <div class="chart-header">
            <span class="chart-title">Respiration</span>
            
        </div>
        <div class="chart-container">
            <canvas id="respCanvas" width="800" height="200"></canvas>
        </div>
    </div>

    <div class="chart-section">
        <div class="chart-header">
            <span class="chart-title">SPO2</span>
            
        </div>
        <div class="chart-container">
            <canvas id="spo2Canvas" width="800" height="200"></canvas>
        </div>
    </div>

    <script>
        // Live clock
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent =
                now.toTimeString().slice(0, 8);
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
    <script src="/static/app.js"></script>

</body>
</html>
