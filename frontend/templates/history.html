<!-- history.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ECG History</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <style>
    body { font-family: sans-serif; background: #111; color: #eee; margin: 0; padding: 16px; }
    h2   { margin: 0 0 12px; font-size: 1rem; color: #aaa; }

    .graphs-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .graph-block {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 10px;
    }

    .graph-block label {
        display: block;
        margin-bottom: 6px;
        font-size: 0.75rem;
        color: var(--text-secondary);
        letter-spacing: 0.08em;
    }

    .graph-block canvas {
        display: block;
        width: 100%;
        height: 90px;      /* Smaller than the current 120px */
        background: #1a1a1a;
        border-radius: 4px;
    }

    .graph-block {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px;
    }

    .graph-block label { display: block; font-size: 0.75rem; color: #888; margin-bottom: 4px; }
    .graph-block canvas {
      display: block;
      width: 100%;
      height: 90px;   /* adjust to 80px or 100px if you want */
      background: #1a1a1a;
      border-radius: 6px;
    }
    .controls {
      display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .controls button {
      padding: 6px 16px; background: #333; color: #eee; border: 1px solid #555;
      border-radius: 4px; cursor: pointer; font-size: 0.85rem;
    }
    .controls button:hover { background: #444; }
    .controls button:disabled { opacity: 0.35; cursor: default; }

    #time-display { font-size: 0.8rem; color: #888; flex: 1; text-align: center; }
    #status       { font-size: 0.75rem; color: #666; }
  </style>
</head>
<body>
  <h2>ECG / Waveform History</h2>

  <div class="controls">
    <label for="patientSelect" style="font-size:0.8rem; color:#888;">Patient:</label>
    <select id="patientSelect"></select>
    <button id="prevBtn">&#8592; Prev 10s</button>
    <span id="time-display">—</span>
    <button id="nextBtn">Next 10s &#8594;</button>
  </div>

  <span id="status">Loading…</span>

  <div class="graphs-grid">
    <div class="graph-block"><label>ECG I</label><canvas id="ecgI"></canvas></div>
    <div class="graph-block"><label>ECG II</label><canvas id="ecgII"></canvas></div>
    <div class="graph-block"><label>ECG V</label><canvas id="ecgV"></canvas></div>
    <div class="graph-block"><label>Resp</label><canvas id="resp"></canvas></div>
    <div class="graph-block"><label>SpO₂</label><canvas id="spo2"></canvas></div>
  </div>
  
  <script src="/static/history.js"></script>
</body>
</html>
